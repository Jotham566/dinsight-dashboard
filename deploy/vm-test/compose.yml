# Dinsight full-stack VM smoke-test compose.
#
# Brings up the whole app on a single VM:
#
#   - postgres   (postgres:16-alpine, internal :5432, persisted volume)
#   - api        (built from $DINSIGHT_API_PATH/Dockerfile, internal :8080)
#   - frontend   (built from $DINSIGHT_FE_PATH/Dockerfile, internal :3000)
#   - caddy      (caddy:2-alpine, host :80, reverse proxy)
#   - mailpit    (axllent/mailpit, captures email; UI on host :8025)
#
# Build contexts point at TWO SEPARATE source trees because the BE and
# FE are independent repos. The cloud engineer's layout has them in
# sibling folders, e.g.:
#
#   ~/work/
#     ├── Dinsight_API_Enhanced/  <-- BE clone
#     └── dinsight-dashboard/  <-- FE clone (this file lives in here)
#
# Set $DINSIGHT_API_PATH in the .env file alongside this compose. See
# .env.example for defaults that work for the layout above.
#
# Quickstart on the VM:
#   git clone <api-repo>          # produces Dinsight_API_Enhanced/
#   git clone <dashboard-repo>    # produces dinsight-dashboard/
#   cd dinsight-dashboard/deploy/vm-test
#   cp .env.example .env          # then edit .env to set JWT_SECRET etc.
#   docker compose up -d --build
#   curl http://localhost/api/v1/health
#   open http://localhost          # FE login page
#
# Tear down:
#   docker compose down            # data persists in named volumes
#   docker compose down -v         # wipes the database too
#
# This file uses build contexts (the engineer is building from source on
# the VM). For real customer deploys this becomes `image: ghcr.io/...`
# pulls from a registry; the rest of the structure stays the same.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dinsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dinsight}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ${DINSIGHT_API_PATH:-../../../Dinsight_API_Enhanced}
      dockerfile: Dockerfile
    image: dinsight-api:${IMAGE_TAG:-vm-test}
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env (openssl rand -hex 32)}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: ${POSTGRES_DB:-dinsight}
      DB_SSLMODE: disable
      SERVER_PORT: "8080"
      # Same-origin via Caddy means the FE never sends a cross-origin
      # request, but the BE's CORS middleware still requires the Origin
      # to be allow-listed. Set ALLOWED_ORIGINS to the public URL.
      ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost}
      GIN_MODE: release
      # Email / SMTP. Defaults deliver to the bundled mailpit sidecar (web UI
      # at :8025). For real outbound mail, set SMTP_HOST/PORT/USERNAME/PASSWORD
      # to your relay (Resend, SendGrid, Mailgun, SES, ...) in .env and switch
      # SMTP_TLS to "true". See .env.example for the Resend reference values.
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_FROM: "${EMAIL_FROM:-noreply@dinsight.local}"
      EMAIL_FROM_NAME: "${EMAIL_FROM_NAME:-Dinsight}"
      APP_BASE_URL: ${PUBLIC_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: "${SMTP_TLS:-false}"
      REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-false}"
      LICENSE_PATH: /app/license.lic
      DEVICES_PATH: /app/devices.json
    volumes:
      # License artifacts live in the BE source tree. Bind-mount them so
      # the image stays generic and devices.json remains writable across
      # restarts. The license public key is embedded in the binary
      # (pkg/license/license.go), so there's no public.pem to mount.
      - ${DINSIGHT_API_PATH:-../../../Dinsight_API_Enhanced}/license.lic:/app/license.lic:ro
      - ${DINSIGHT_API_PATH:-../../../Dinsight_API_Enhanced}/devices.json:/app/devices.json
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: on-failure:5

  frontend:
    build:
      context: ${DINSIGHT_FE_PATH:-../../frontend}
      dockerfile: Dockerfile
      args:
        # Same-origin: the FE calls /api/v1/* and Caddy routes those
        # to the api service. No cross-origin, no CORS dance.
        NEXT_PUBLIC_API_URL: /api/v1
    image: dinsight-frontend:${IMAGE_TAG:-vm-test}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      # SMTP isn't exposed on the host (the api container reaches it via
      # the compose network); the web UI is, so the engineer can browse
      # captured email at http://VM-IP:8025
      - "${MAILPIT_PORT:-8025}:8025"
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
